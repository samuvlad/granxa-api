services:
  db:
    image: postgis/postgis:15-3.4
    container_name: granxa-maps-db
    environment:
      POSTGRES_USER: granxa
      POSTGRES_PASSWORD: granxa
      POSTGRES_DB: granxa_maps
    ports:
      - "5433:5432"
    volumes:
      - granxa-maps-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granxa -d granxa_maps"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: granxa-maps-api
    environment:
      DATABASE_URL: postgresql+psycopg2://granxa:granxa@db:5432/granxa_maps
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 127.0.0.11
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["bash", "/app/entrypoint.sh"]

volumes:
  granxa-maps-data:
